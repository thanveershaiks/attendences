<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Student Attendance Terminal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 14px;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .app-title { font-size: 1.6rem; font-weight: 700; color: var(--accent); text-align: center; }
  .app-sub { color: var(--muted); font-size: 0.9rem; text-align: center; margin-top: -8px; margin-bottom: 12px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  input[type=text] {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 12px;
  }
  input[type=text]:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--accent2); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #statusLog {
    background: #020617;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    min-height: 70px;
    font-family: monospace;
    font-size: 0.8rem;
    color: #7dd3fc;
    word-break: break-all;
  }
  #successScreen {
    display: none;
    text-align: center;
    flex-direction: column;
    gap: 12px;
  }
  .success-icon { font-size: 4rem; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container" id="mainLayout">
  <div>
    <div class="app-title">🎓 Student Terminal</div>
    <div class="app-sub">Submit attendance directly over BLE wireless</div>
  </div>

  <div class="card">
    <div class="card-title">Personal Credentials</div>
    <input type="text" id="stuName" placeholder="Enter Full Name" autocomplete="off" />
    <input type="text" id="stuRoll" placeholder="Enter Roll Number" autocomplete="off" />
  </div>

  <button class="btn btn-primary" id="actionBtn" onclick="transmitAttendance()">
    Transmit Attendance Record
  </button>

  <div class="card">
    <div class="card-title">Console Terminal Connection Log</div>
    <div id="statusLog">Awaiting validation parameters...</div>
  </div>
</div>

<div class="container" id="successScreen">
  <div class="success-icon">🎉</div>
  <div style="font-size: 1.6rem; font-weight: 800; color: var(--accent2);">Attendance Verified</div>
  <p id="successMessage" style="color: var(--muted); font-size: 0.95rem;"></p>
  <button class="btn btn-primary" style="margin-top: 12px;" onclick="resetForm()">Submit Another Entry</button>
</div>

<script>
  const ROOM_SERVICE_UUID = '8ce255c0-200a-11e0-ac64-0800200c9a66';
  const DATA_CHAR_UUID    = '8ce255c1-200a-11e0-ac64-0800200c9a66';

  function displayLog(msg) {
    const consoleLog = document.getElementById('statusLog');
    consoleLog.innerHTML = msg;
  }

  async function transmitAttendance() {
    const name = document.getElementById('stuName').value.trim();
    const roll = document.getElementById('stuRoll').value.trim();
    const actionBtn = document.getElementById('actionBtn');

    if (!name || !roll) {
      displayLog("⚠️ Please provide validation fields completely prior to scanning.");
      return;
    }

    // Standardize the payload format to match what the Kotlin app expects ("NAME|ROLLNO")
    const structuredPayload = `${name}|${roll}`;

    actionBtn.disabled = true;
    actionBtn.innerHTML = '<span class="spinner"></span>Connecting via BLE...';
    displayLog("Searching for active classroom transmission beacon...");

    try {
      // 1. Scan for the specific BLE Service UUID being broadcast by the teacher's app
      const bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ services: [ROOM_SERVICE_UUID] }]
      });

      displayLog(`Target acquired: ${bleDevice.name}. Synchronizing transmission channels...`);
      
      // 2. Connect to the GATT Server on the teacher's phone (No OS pairing required!)
      const gattServer = await bleDevice.gatt.connect();

      displayLog("Channel established. Pushing localized encryption credentials...");
      
      // 3. Look up the designated Service and Characteristic
      const primaryService = await gattServer.getPrimaryService(ROOM_SERVICE_UUID);
      const outputCharacteristic = await primaryService.getCharacteristic(DATA_CHAR_UUID);

      // 4. Encode and send the payload
      const textEncoder = new TextEncoder();
      const rawBinaryPacket = textEncoder.encode(structuredPayload);
      
      await outputCharacteristic.writeValue(rawBinaryPacket);

      displayLog("✅ Acknowledgement token verified successfully!");
      
      // Disconnect cleanly so other students can connect right away
      setTimeout(() => { gattServer.disconnect(); }, 500);

      // Transition smoothly to the success UI screen layout
      document.getElementById('mainLayout').style.display = 'none';
      const successScreen = document.getElementById('successScreen');
      successScreen.style.display = 'flex';
      document.getElementById('successMessage').innerText = `${name} (${roll}) — Verified present on system server log.`;

    } catch (bleError) {
      console.error(bleError);
      displayLog(`❌ API Pipeline drop: ${bleError.message || bleError}`);
      actionBtn.disabled = false;
      actionBtn.innerHTML = 'Transmit Attendance Record';
    }
  }

  function resetForm() {
    document.getElementById('stuName').value = '';
    document.getElementById('stuRoll').value = '';
    document.getElementById('actionBtn').disabled = false;
    document.getElementById('actionBtn').innerHTML = 'Transmit Attendance Record';
    document.getElementById('statusLog').innerHTML = 'Awaiting validation parameters...';
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('mainLayout').style.display = 'flex';
  }
</script>
</body>
</html>
