<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0f1117"/>
<title>AttendX — Student Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg: #0f1117; --surface: #161b27; --surface2: #1e2535; --border: #1e2d45; --border-strong: #2a3f5f;
  --text-main: #eef2ff; --text-muted: #8fa3c0; --text-dark: #4d6280;
  --primary: #2563eb; --primary-hover: #1d4ed8; --primary-bg: rgba(37, 99, 235, 0.15);
  --success: #10b981; --success-bg: rgba(16, 185, 129, 0.12);
  --danger: #f43f5e; --danger-bg: rgba(244, 63, 94, 0.12);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 20px; --radius-full: 9999px;
  --font-sans: 'Inter', system-ui, sans-serif; --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100vh; background: var(--bg); color: var(--text-main); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
.container { width: 100%; max-width: 420px; display: none; flex-direction: column; gap: 20px; }
.container.active { display: flex; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
.brand-header { text-align: center; margin-bottom: 8px; }
.brand-icon { width: 52px; height: 52px; background: var(--primary); color: #ffffff; border-radius: var(--radius-md); display: grid; place-items: center; font-size: 1.6rem; margin: 0 auto 16px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
.app-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
.app-title span { color: var(--primary); }
.app-sub { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
.card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 16px; }
.input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.input-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.input-field { width: 100%; padding: 12px 16px; font-size: 0.95rem; background: var(--surface2); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text-main); transition: all 0.2s ease; outline: none; font-weight: 500; }
.input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
.btn { width: 100%; padding: 14px; font-size: 0.95rem; font-weight: 700; border-radius: var(--radius-full); border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); user-select: none; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary); color: #ffffff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
#statusLog { background: #090b11; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; min-height: 80px; font-family: var(--font-mono); font-size: 0.8rem; color: #60a5fa; word-break: break-all; line-height: 1.4; }
.address-tag { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dark); text-align: center; margin-top: 4px; letter-spacing: 0.03em; font-weight: 600; }
.error-box { background: var(--danger-bg); border: 1px solid rgba(244, 63, 94, 0.2); color: var(--danger); padding: 14px; border-radius: var(--radius-md); font-size: 0.85rem; display: none; }
.success-icon { width: 72px; height: 72px; background: var(--success-bg); color: var(--success); border-radius: var(--radius-full); display: grid; place-items: center; font-size: 2.2rem; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
</style>
</head>
<body>

<div class="container active" id="mainLayout">
  <div id="browserError" class="error-box"></div>
  <div class="brand-header"><div class="brand-icon"><i class="ti ti-fingerprint"></i></div><h1 class="app-title">Attend<span>X</span></h1><p class="app-sub">Student Authentication Terminal</p></div>
  <div class="card">
    <div class="card-title">Personal Credentials</div>
    <div class="input-group"><label class="input-label">Full Name</label><input type="text" id="stuName" class="input-field" placeholder="John Doe" autocomplete="off" /></div>
    <div class="input-group"><label class="input-label">Roll Number</label><input type="text" id="stuRoll" class="input-field" placeholder="B2-01" autocomplete="off" /></div>
  </div>
  <button class="btn btn-primary" id="actionBtn" onclick="transmitAttendance()"><i class="ti ti-broadcast"></i> Transmit Attendance Record</button>
  <div class="card" style="padding: 20px;"><div class="card-title" style="margin-bottom: 10px;">Connection Status Log</div><div id="statusLog">Awaiting validation parameters...</div></div>
  <div class="address-tag" id="deviceAddressDisplay">V-MAC ADDRESS: COMPUTING ID...</div>
</div>

<div class="container" id="successScreen" style="text-align: center;">
  <div class="card" style="padding: 40px 24px;">
    <div class="success-icon"><i class="ti ti-discount-check-filled"></i></div>
    <h2 style="font-size: 1.6rem; font-weight: 800; color: var(--success); margin-bottom: 8px;">Attendance Verified</h2>
    <p id="successMessage" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; white-space: pre-line;"></p>
    <button class="btn btn-primary" onclick="resetForm()"><i class="ti ti-reload"></i> Submit Another Entry</button>
  </div>
</div>

<script>
  const ROOM_SERVICE_UUID = '8ce255c0-200a-11e0-ac64-0800200c9a66';
  const DATA_CHAR_UUID    = '8ce255c1-200a-11e0-ac64-0800200c9a66';

  function getDeviceAddress() {
    let address = localStorage.getItem('_ble_device_mac_address');
    if (!address) {
      const blocks = [];
      const cryptoArray = new Uint8Array(6);
      window.crypto.getRandomValues(cryptoArray);
      cryptoArray.forEach((byte, index) => {
        let hexValue = byte;
        if (index === 0) hexValue = (byte | 2) & 254;
        blocks.push(hexValue.toString(16).padStart(2, '0').toUpperCase());
      });
      address = blocks.join(':');
      localStorage.setItem('_ble_device_mac_address', address);
    }
    return address;
  }

  function checkCompatibility() {
    const errorBox = document.getElementById('browserError');
    const actionBtn = document.getElementById('actionBtn');
    if (!navigator.bluetooth) {
      errorBox.style.display = 'block'; actionBtn.disabled = true;
      if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
        errorBox.innerHTML = "<strong>Security Protocol Block:</strong> Web Bluetooth requires an <b>HTTPS</b> connection.";
      } else {
        errorBox.innerHTML = "<strong>API Compatibility Error:</strong> Browser doesn't support Web Bluetooth. Use Chrome on Android or Bluefy on iOS.";
      }
      return false;
    }
    return true;
  }

  window.onload = function() {
    checkCompatibility();
    document.getElementById('deviceAddressDisplay').innerText = `V-MAC ADDRESS: ${getDeviceAddress()}`;
  };

  function displayLog(msg) { document.getElementById('statusLog').innerHTML = msg; }

  async function transmitAttendance() {
    if (!checkCompatibility()) return;
    const name = document.getElementById('stuName').value.trim();
    const roll = document.getElementById('stuRoll').value.trim();
    const actionBtn = document.getElementById('actionBtn');
    const deviceAddress = getDeviceAddress();

    if (!name || !roll) { displayLog("⚠️ Credentials fields incomplete."); return; }
    const structuredPayload = `${name}|${roll}|${deviceAddress}`;
    
    actionBtn.disabled = true;
    actionBtn.innerHTML = '<span class="spinner"></span> Synchronizing...';
    displayLog("Scanning for classroom tracking beacon framework...");

    try {
      const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [ROOM_SERVICE_UUID] }] });
      displayLog("Beacon targeted. Establishing GATT bridge...");
      const server = await device.gatt.connect();
      await new Promise(resolve => setTimeout(resolve, 800));
      
      displayLog("Pushing structured payload records...");
      const service = await server.getPrimaryService(ROOM_SERVICE_UUID);
      const char = await service.getCharacteristic(DATA_CHAR_UUID);
      
      await char.writeValue(new TextEncoder().encode(structuredPayload));
      displayLog("✅ Acknowledgement verification clear!");
      setTimeout(() => server.disconnect(), 500);

      document.getElementById('mainLayout').classList.remove('active');
      document.getElementById('successScreen').classList.add('active');
      document.getElementById('successMessage').innerText = `${name} (${roll})\nSecure log recorded on backend via hardware authentication link.`;
    } catch (err) {
      console.error(err);
      displayLog(`❌ API Pipeline Failure: ${err.message}`);
      actionBtn.disabled = false;
      actionBtn.innerHTML = '<i class="ti ti-broadcast"></i> Transmit Attendance Record';
    }
  }

  function resetForm() {
    document.getElementById('stuName').value = ''; document.getElementById('stuRoll').value = '';
    document.getElementById('actionBtn').disabled = false;
    document.getElementById('actionBtn').innerHTML = '<i class="ti ti-broadcast"></i> Transmit Attendance Record';
    document.getElementById('statusLog').innerHTML = 'Awaiting validation parameters...';
    document.getElementById('successScreen').classList.remove('active');
    document.getElementById('mainLayout').classList.add('active');
  }
</script>
</body>
</html>
